# gitleaks configuration for CoWork OS
# See: https://github.com/gitleaks/gitleaks#configuration

title = "CoWork OS gitleaks config"

[allowlist]
description = "Allowlist for known false positives"
# LLM model name strings in schema.ts seed data (llm_pricing table) are not API keys
regexTarget = "line"
regexes = [
  '''^\s*\{ key: "[a-z][a-z0-9._-]+"''',
]
